# Project-wide Gradle settings.

# JVM arguments for Gradle daemon — increase heap for Kotlin compilation.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# Run Gradle in daemon mode for faster incremental builds.
org.gradle.daemon=true

# Configure-only approach: only configure common settings in this phase.
org.gradle.configureondemand=true

# Enable Gradle build cache.
org.gradle.caching=true

# AndroidX package — replace support library.
android.useAndroidX=true

# Kotlin code style.
kotlin.code.style=official

# Non-transitive R classes — smaller R class per module.
android.nonTransitiveRClass=true

# Allow Compose compiler reports.
android.defaults.buildfeatures.buildconfig=true
